<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าต่างสนทนา — Stock Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .chat-page { width: 100%; max-width: 1180px; display: flex; flex-direction: column; gap: 1rem; }
        .chat-header {
            display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
            background: var(--card); border: 1px solid var(--card-border); border-radius: 14px;
            padding: 1rem 1.1rem;
        }
        .chat-header h1 { margin: 0; font-size: 1.45rem; font-family: 'Kanit', sans-serif; }
        .chat-header p { margin: 0.25rem 0 0; color: var(--text-muted); font-size: 0.85rem; }

        .chat-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: flex-end; }
        .chat-btn {
            display: inline-flex; align-items: center; gap: 0.45rem;
            padding: 0.5rem 0.75rem; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: #fff; cursor: pointer; user-select: none;
            font-family: 'Kanit', sans-serif; font-size: 0.85rem;
            transition: transform .12s, background .12s, border-color .12s;
        }
        .chat-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.08); }
        .chat-btn.danger { border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.10); }

        .chat-shell {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 190px);
            overflow: hidden;
        }
        .chat-log {
            flex: 1;
            padding: 1rem;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        .msg { display: flex; gap: 0.65rem; align-items: flex-end; }
        .msg.me { justify-content: flex-end; }

        .bubble {
            max-width: min(680px, 92%);
            padding: 0.7rem 0.85rem;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg.me .bubble {
            background: rgba(59,130,246,0.18);
            border-color: rgba(59,130,246,0.35);
        }
        .msg.sys .bubble {
            background: rgba(16,185,129,0.10);
            border-color: rgba(16,185,129,0.28);
        }

        .meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.25rem; }
        .msg.me .meta { text-align: right; }

        .composer {
            border-top: 1px solid var(--card-border);
            padding: 0.75rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.6rem;
            background: rgba(0,0,0,0.12);
        }
        .composer textarea {
            width: 100%;
            min-height: 44px;
            max-height: 160px;
            resize: none;
            padding: 0.6rem 0.75rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(0,0,0,0.18);
            color: #fff;
            font-family: 'Kanit', sans-serif;
            outline: none;
        }
        .composer textarea:focus { border-color: rgba(59,130,246,0.55); box-shadow: 0 0 0 2px rgba(59,130,246,0.18); }
        .send-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem;
            padding: 0.6rem 0.85rem;
            border-radius: 12px;
            border: 1px solid rgba(59,130,246,0.45);
            background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
            color: #fff; cursor: pointer;
            font-family: 'Kanit', sans-serif;
            min-width: 98px;
        }
        .send-btn:disabled { opacity: 0.55; cursor: not-allowed; }
        .hint {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-muted);
            font-size: 0.82rem;
        }
        .hint code { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); padding: 0.1rem 0.35rem; border-radius: 8px; }

        .name-modal {
            position: fixed; inset: 0; z-index: 60;
            display: none;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.62);
            padding: 1.25rem;
        }
        .name-modal.show { display: flex; }
        .name-card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 1rem;
            box-shadow: 0 18px 48px rgba(0,0,0,.45);
        }
        .name-card h2 { margin: 0; font-size: 1.15rem; font-family: 'Kanit', sans-serif; }
        .name-card p { margin: 0.35rem 0 0.8rem; color: var(--text-muted); font-size: 0.85rem; }
        .name-row { display: grid; grid-template-columns: 1fr auto; gap: 0.6rem; }
        .name-row input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(0,0,0,0.18);
            color: #fff;
            font-family: 'Kanit', sans-serif;
            outline: none;
        }
        .name-row input:focus { border-color: rgba(59,130,246,0.55); box-shadow: 0 0 0 2px rgba(59,130,246,0.18); }
    </style>
</head>
<body class="has-sidebar">
<div class="app-layout">
    <aside class="sidebar" id="appSidebar" data-active-page="chat" aria-label="เมนูหลัก"></aside>
    <main class="main-area">
        <div class="chat-page dashboard-container">
            <header class="chat-header">
                <div>
                    <h1>หน้าต่างสนทนา</h1>
                    <p>เก็บใน Supabase แบบเรียลไทม์ · แจ้งเตือนทุกหน้าเมื่อมีข้อความใหม่ · <code>Enter</code> ส่ง · <code>Shift+Enter</code> ขึ้นบรรทัดใหม่</p>
                </div>
                <div class="chat-actions">
                    <button class="chat-btn" id="btnExport"><i data-lucide="download" style="width:16px;height:16px;"></i> ส่งออก</button>
                    <button class="chat-btn danger" id="btnClear"><i data-lucide="trash-2" style="width:16px;height:16px;"></i> ล้างแชท</button>
                </div>
            </header>

            <section class="chat-shell">
                <div class="hint" id="hintBar"></div>
                <div class="chat-log" id="chatLog" aria-live="polite"></div>
                <div class="composer">
                    <textarea id="chatInput" placeholder="พิมพ์ข้อความ..." autocomplete="off"></textarea>
                    <button class="send-btn" id="btnSend"><i data-lucide="send" style="width:16px;height:16px;"></i> ส่ง</button>
                </div>
            </section>
        </div>
    </main>
</div>

<div class="name-modal" id="nameModal" role="dialog" aria-modal="true" aria-label="กรอกชื่อก่อนเข้าแชท">
    <div class="name-card">
        <h2>กรอกชื่อก่อนเข้าแชท</h2>
        <p>ระบบไม่มีการล็อกอิน จึงใช้ “ชื่อที่กรอก” สำหรับแสดงในกลุ่มแชท</p>
        <div class="name-row">
            <input id="nameInput" type="text" placeholder="เช่น Aom / โกดัง1 / ผู้ตรวจ" maxlength="40" autocomplete="off">
            <button class="send-btn" id="btnEnterChat" type="button"><i data-lucide="log-in" style="width:16px;height:16px;"></i> เข้าแชท</button>
        </div>
    </div>
</div>

<script src="../Js/sidebar-shared.js"></script>
<script src="../Js/api.js"></script>
<script>
    lucide.createIcons();

    const ROOM_ID = 'main';
    const STORAGE_KEY = 'audit_chat_v2';
    const NAME_KEY = 'audit_chat_name_v1';
    const SESSION_KEY = 'audit_chat_session_v1';

    const logEl = document.getElementById('chatLog');
    const inputEl = document.getElementById('chatInput');
    const btnSend = document.getElementById('btnSend');
    const hintBar = document.getElementById('hintBar');

    const nameModal = document.getElementById('nameModal');
    const nameInput = document.getElementById('nameInput');
    const btnEnterChat = document.getElementById('btnEnterChat');

    let supabaseClient = null;
    let realtimeChannel = null;
    let myName = '';
    let clientSessionId = '';

    function escapeHtml(s) {
        return String(s ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function uuid() {
        try { if (crypto?.randomUUID) return crypto.randomUUID(); } catch { /* ignore */ }
        return 'id_' + Math.random().toString(16).slice(2) + '_' + Date.now();
    }

    function nowLabel(ts) {
        try { return new Date(ts).toLocaleString('th-TH', { hour12: false }); } catch { return ''; }
    }

    function loadMessages() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            const arr = raw ? JSON.parse(raw) : [];
            return Array.isArray(arr) ? arr : [];
        } catch { return []; }
    }

    function saveMessages(msgs) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
    }

    function normalizeText(text) {
        return String(text || '').replace(/\r\n/g, '\n').trim();
    }

    function getOrCreateSessionId() {
        const existing = localStorage.getItem(SESSION_KEY);
        if (existing) return existing;
        const id = uuid();
        localStorage.setItem(SESSION_KEY, id);
        return id;
    }

    function getSupabase() {
        try { return window.apiService?.getClient?.() || null; } catch { return null; }
    }

    function pushMessageLocal(message) {
        const messages = loadMessages();
        messages.push(message);
        if (messages.length > 500) messages.splice(0, messages.length - 500);
        saveMessages(messages);
        updateHint(messages);
        render(messages);
    }

    function render(messages) {
        if (!messages.length) {
            logEl.innerHTML = `
                <div class="msg sys">
                    <div class="bubble">
                        เริ่มสนทนาได้เลย — ถ้าเชื่อม Supabase แล้ว ข้อความจะอยู่ในกลุ่มแชทแบบเรียลไทม์
                        <div class="meta">${escapeHtml(nowLabel(Date.now()))}</div>
                    </div>
                </div>`;
            return;
        }

        logEl.innerHTML = messages.map(m => {
            const isMe = m.client_session_id && clientSessionId && m.client_session_id === clientSessionId;
            const isSys = m.event_type === 'join' || m.role === 'sys';
            const cls = isMe ? 'msg me' : isSys ? 'msg sys' : 'msg';
            const meta = escapeHtml(nowLabel(m.ts));
            const namePrefix = (!isMe && !isSys && m.sender_name) ? `<strong>${escapeHtml(m.sender_name)}:</strong> ` : '';
            return `
                <div class="${cls}">
                    <div class="bubble">${namePrefix}${escapeHtml(m.text)}<div class="meta">${meta}</div></div>
                </div>`;
        }).join('');

        logEl.scrollTop = logEl.scrollHeight;
    }

    function updateHint(messages) {
        const total = messages.length;
        const meCount = messages.filter(m => m.client_session_id && clientSessionId && m.client_session_id === clientSessionId).length;
        const mode = supabaseClient ? 'Realtime: ON' : 'Realtime: OFF (local)';
        hintBar.textContent = total
            ? `${mode} · ทั้งหมด ${total.toLocaleString()} ข้อความ · คุณส่ง ${meCount.toLocaleString()} ข้อความ · ชื่อ: ${myName || '-'}`
            : `${mode} · ยังไม่มีข้อความ · ชื่อ: ${myName || '-'}`;
    }

    /** คอลัมน์ legacy ในตารางเก่า: session_id, role (NOT NULL) */
    function buildChatInsertPayload({ eventType, text }) {
        const sid = clientSessionId || uuid();
        const payload = {
            room_id: ROOM_ID,
            event_type: eventType,
            sender_name: myName || null,
            message: text,
            client_session_id: sid,
            client_msg_id: uuid(),
            session_id: sid
        };
        if (eventType === 'join') payload.role = 'sys';
        else payload.role = 'me';
        return payload;
    }

    function rowSessionId(row) {
        return row?.client_session_id || row?.session_id || null;
    }

    async function sendToSupabase({ eventType, text }) {
        if (!supabaseClient) return false;
        const { error } = await supabaseClient.from('chat_messages').insert([buildChatInsertPayload({ eventType, text })]);
        if (error) throw error;
        return true;
    }

    async function sendCurrent() {
        const text = normalizeText(inputEl.value);
        if (!text) return;
        inputEl.value = '';
        btnSend.disabled = true;
        try {
            if (supabaseClient) await sendToSupabase({ eventType: 'message', text });
            else pushMessageLocal({ role: 'me', event_type: 'message', sender_name: myName || null, text, ts: Date.now(), client_session_id: clientSessionId });
        } catch (err) {
            pushMessageLocal({ role: 'sys', event_type: 'sys', sender_name: null, text: 'ส่งไม่สำเร็จ: ' + (err?.message || String(err)), ts: Date.now(), client_session_id: null });
        } finally {
            btnSend.disabled = !normalizeText(inputEl.value);
            inputEl.focus();
        }
    }

    function setupRealtime() {
        if (!supabaseClient) return;
        if (realtimeChannel) {
            try { supabaseClient.removeChannel(realtimeChannel); } catch { /* ignore */ }
            realtimeChannel = null;
        }
        realtimeChannel = supabaseClient
            .channel('chat_room_' + ROOM_ID)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: 'room_id=eq.' + ROOM_ID }, (payload) => {
                const row = payload?.new || {};
                const sid = rowSessionId(row);
                pushMessageLocal({
                    role: row.event_type === 'join' ? 'sys' : (sid === clientSessionId ? 'me' : 'user'),
                    event_type: row.event_type || 'message',
                    sender_name: row.sender_name || null,
                    text: row.message || '',
                    ts: row.created_at ? Date.parse(row.created_at) : Date.now(),
                    client_session_id: sid
                });
            })
            .subscribe();
    }

    async function loadHistoryFromSupabase() {
        const { data, error } = await supabaseClient
            .from('chat_messages')
            .select('event_type,sender_name,message,created_at,client_session_id,session_id')
            .eq('room_id', ROOM_ID)
            .order('created_at', { ascending: true })
            .limit(200);
        if (error) throw error;
        const mapped = (data || []).map(row => {
            const sid = rowSessionId(row);
            return {
                role: row.event_type === 'join' ? 'sys' : (sid === clientSessionId ? 'me' : 'user'),
                event_type: row.event_type || 'message',
                sender_name: row.sender_name || null,
                text: row.message || '',
                ts: row.created_at ? Date.parse(row.created_at) : Date.now(),
                client_session_id: sid
            };
        });
        saveMessages(mapped);
        updateHint(mapped);
        render(mapped);
    }

    async function announceJoinOnce() {
        const key = 'join_sent_' + ROOM_ID;
        if (sessionStorage.getItem(key) === '1') return;
        sessionStorage.setItem(key, '1');
        const text = `${myName} เข้าร่วมแชท`;
        if (!supabaseClient) {
            pushMessageLocal({ role: 'sys', event_type: 'join', sender_name: null, text, ts: Date.now(), client_session_id: null });
            return;
        }
        try { await sendToSupabase({ eventType: 'join', text }); } catch (err) {
            pushMessageLocal({ role: 'sys', event_type: 'sys', sender_name: null, text: 'แจ้งเตือนเข้าแชทไม่สำเร็จ: ' + (err?.message || String(err)), ts: Date.now(), client_session_id: null });
        }
    }

    function openNameModal() {
        nameModal.classList.add('show');
        setTimeout(() => nameInput.focus(), 0);
    }

    function closeNameModal() {
        nameModal.classList.remove('show');
    }

    async function enterChat() {
        const name = normalizeText(nameInput.value);
        if (!name) return;
        myName = name.slice(0, 40);
        localStorage.setItem(NAME_KEY, myName);
        closeNameModal();

        clientSessionId = getOrCreateSessionId();
        supabaseClient = getSupabase();

        // แสดง local cache ก่อน
        const initial = loadMessages();
        updateHint(initial);
        render(initial);

        if (supabaseClient) {
            try {
                await loadHistoryFromSupabase();
                setupRealtime();
            } catch (err) {
                pushMessageLocal({ role: 'sys', event_type: 'sys', sender_name: null, text: 'โหลดแชทจาก Supabase ไม่สำเร็จ: ' + (err?.message || String(err)), ts: Date.now(), client_session_id: null });
            }
        } else {
            pushMessageLocal({ role: 'sys', event_type: 'sys', sender_name: null, text: 'ยังไม่ได้เชื่อมต่อ Supabase (ไปที่หน้า ตั้งค่า เพื่อกรอก URL/KEY) — ตอนนี้เก็บแบบ local เท่านั้น', ts: Date.now(), client_session_id: null });
        }

        await announceJoinOnce();
        if (window.chatNotifyShared) window.chatNotifyShared.markRead();
        btnSend.disabled = !normalizeText(inputEl.value);
        inputEl.focus();
    }

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && window.chatNotifyShared) {
            window.chatNotifyShared.markRead();
        }
    });

    // events
    document.getElementById('btnSend').addEventListener('click', sendCurrent);
    inputEl.addEventListener('input', () => { btnSend.disabled = !normalizeText(inputEl.value); });
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendCurrent(); } });

    btnEnterChat.addEventListener('click', enterChat);
    nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); enterChat(); } });

    document.getElementById('btnClear').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        const messages = [];
        updateHint(messages);
        render(messages);
        inputEl.focus();
    });

    document.getElementById('btnExport').addEventListener('click', () => {
        const messages = loadMessages();
        const payload = { exportedAt: new Date().toISOString(), roomId: ROOM_ID, name: myName || null, clientSessionId, messages };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `chat_export_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
    });

    // init
    clientSessionId = getOrCreateSessionId();
    myName = normalizeText(localStorage.getItem(NAME_KEY) || '');
    const initial = loadMessages();
    updateHint(initial);
    render(initial);
    btnSend.disabled = true;
    if (!myName) openNameModal();
    else { nameInput.value = myName; enterChat(); }
</script>
</body>
</html>
