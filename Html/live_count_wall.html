<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จอแสดงผลนับสด — Stock Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --wall-pending: #f59e0b;
            --wall-done: #34d399;
            --wall-line: rgba(255,255,255,0.08);
        }

        body.wall-fullscreen .sidebar {
            display: none;
        }
        body.wall-fullscreen .main-area {
            margin-left: 0;
            max-width: none;
            width: 100%;
        }

        .wall-page {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            height: calc(100vh - 48px);
            min-height: 520px;
        }

        .wall-topbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.25rem 0;
        }

        .wall-title-block h1 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .wall-title-block h1 svg { width: 22px; height: 22px; color: #60a5fa; }
        .wall-title-block p {
            margin: 0.2rem 0 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .wall-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .wall-field {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .wall-field label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .wall-field select {
            min-width: 160px;
            padding: 0.45rem 0.65rem;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text);
            font-family: Kanit, sans-serif;
            font-size: 0.82rem;
        }

        .wall-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.48rem 0.9rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            font-family: Kanit, sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .wall-btn:hover { background: rgba(255,255,255,0.1); }
        .wall-btn svg { width: 15px; height: 15px; }
        .wall-btn-primary {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            border-color: transparent;
            color: #fff;
        }

        .wall-live-badge {
            font-size: 0.72rem;
            padding: 0.3rem 0.65rem;
            border-radius: 999px;
            background: rgba(239,68,68,0.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.35);
        }
        .wall-live-badge.wall-live-on {
            background: rgba(16,185,129,0.15);
            color: #6ee7b7;
            border-color: rgba(16,185,129,0.4);
        }

        .wall-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            width: 100%;
        }

        .wall-split {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            min-height: 0;
        }

        @media (max-width: 900px) {
            .wall-split { grid-template-columns: 1fr; }
            .wall-page { height: auto; min-height: 0; }
        }

        .wall-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            background: linear-gradient(165deg, rgba(24,24,27,0.97), rgba(12,12,14,0.99));
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(0,0,0,0.25);
        }

        .wall-panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--wall-line);
        }
        .wall-panel-head h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .wall-panel-head h2 svg { width: 18px; height: 18px; }

        .wall-panel-pending .wall-panel-head {
            background: rgba(245,158,11,0.08);
            border-bottom-color: rgba(245,158,11,0.25);
        }
        .wall-panel-pending .wall-panel-head h2 { color: #fcd34d; }
        .wall-panel-pending .wall-panel-head h2 svg { color: var(--wall-pending); }

        .wall-panel-done .wall-panel-head {
            background: rgba(52,211,153,0.08);
            border-bottom-color: rgba(52,211,153,0.25);
        }
        .wall-panel-done .wall-panel-head h2 { color: #a7f3d0; }
        .wall-panel-done .wall-panel-head h2 svg { color: var(--wall-done); }

        .wall-count {
            font-size: 1.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .wall-panel-pending .wall-count { color: var(--wall-pending); }
        .wall-panel-done .wall-count { color: var(--wall-done); }

        .wall-panel-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .wall-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .wall-card {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            padding: 0.55rem 0.7rem;
            border-radius: 10px;
            border: 1px solid var(--wall-line);
            background: rgba(0,0,0,0.2);
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }
        .wall-card-pending { border-left: 3px solid var(--wall-pending); }
        .wall-card-done { border-left: 3px solid var(--wall-done); }
        .wall-card-flash {
            animation: wallFlash 1.2s ease-out;
            border-color: rgba(52,211,153,0.6);
            background: rgba(16,185,129,0.12);
        }
        @keyframes wallFlash {
            0% { transform: scale(1.02); box-shadow: 0 0 0 3px rgba(52,211,153,0.45); }
            100% { transform: scale(1); box-shadow: none; }
        }

        .wall-card-rank {
            flex-shrink: 0;
            width: 1.6rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding-top: 0.15rem;
        }
        .wall-card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.12rem; }
        .wall-card-sku { font-size: 0.92rem; color: #f8fafc; }
        .wall-card-name { font-size: 0.78rem; color: #cbd5e1; }
        .wall-card-meta { font-size: 0.72rem; color: var(--text-muted); }
        .wall-card-qty {
            flex-shrink: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--wall-done);
            padding-top: 0.1rem;
        }
        .wall-tag-today {
            font-style: normal;
            color: #6ee7b7;
            font-size: 0.68rem;
        }

        .wall-empty {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--text-muted);
        }
        .wall-empty svg { width: 40px; height: 40px; opacity: 0.4; margin-bottom: 0.5rem; }

        /* Toast มุมขวาบน */
        .wall-toast-stack {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: min(380px, calc(100vw - 32px));
            pointer-events: none;
        }
        .wall-toast {
            pointer-events: auto;
            display: flex;
            gap: 0.65rem;
            align-items: flex-start;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(6,78,59,0.95), rgba(15,23,42,0.98));
            border: 1px solid rgba(52,211,153,0.45);
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
            animation: wallToastIn 0.35s ease-out;
        }
        .wall-toast-out { animation: wallToastOut 0.28s ease-in forwards; }
        @keyframes wallToastIn {
            from { opacity: 0; transform: translateX(24px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes wallToastOut {
            to { opacity: 0; transform: translateX(24px); }
        }
        .wall-toast-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(52,211,153,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .wall-toast-icon svg { width: 20px; height: 20px; color: #34d399; }
        .wall-toast-insert {
            border-color: rgba(52, 211, 153, 0.45);
            background: linear-gradient(135deg, rgba(6, 78, 59, 0.95), rgba(15, 23, 42, 0.98));
        }
        .wall-toast-insert .wall-toast-icon { background: rgba(52, 211, 153, 0.2); }
        .wall-toast-insert .wall-toast-icon svg { color: #34d399; }
        .wall-toast-insert .wall-toast-body strong { color: #ecfdf5; }

        .wall-toast-update {
            border-color: rgba(96, 165, 250, 0.5);
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.95), rgba(15, 23, 42, 0.98));
        }
        .wall-toast-update .wall-toast-icon { background: rgba(96, 165, 250, 0.2); }
        .wall-toast-update .wall-toast-icon svg { color: #60a5fa; }
        .wall-toast-update .wall-toast-body strong { color: #dbeafe; }
        .wall-toast-update .wall-toast-body p { color: #bfdbfe; }

        .wall-toast-delete {
            border-color: rgba(248, 113, 113, 0.5);
            background: linear-gradient(135deg, rgba(127, 29, 29, 0.92), rgba(15, 23, 42, 0.98));
        }
        .wall-toast-delete .wall-toast-icon { background: rgba(248, 113, 113, 0.2); }
        .wall-toast-delete .wall-toast-icon svg { color: #f87171; }
        .wall-toast-delete .wall-toast-body strong { color: #fee2e2; }
        .wall-toast-delete .wall-toast-body p { color: #fecaca; }

        .wall-toast-body { flex: 1; min-width: 0; }
        .wall-toast-body strong { display: block; font-size: 0.88rem; color: #ecfdf5; margin-bottom: 0.2rem; }
        .wall-toast-body p { margin: 0; font-size: 0.8rem; color: #d1fae5; line-height: 1.35; }
        .wall-toast-sub { color: #94a3b8 !important; font-size: 0.75rem !important; }
        .wall-toast-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.25rem;
            cursor: pointer;
            line-height: 1;
            padding: 0 0.2rem;
        }
        .wall-toast-close:hover { color: #fff; }
    </style>
</head>
<body class="has-sidebar">
<div class="app-layout">
    <aside id="appSidebar" class="sidebar" data-active-page="live_count_wall" aria-label="เมนูหลัก"></aside>

    <main class="main-area">
        <div class="wall-page">
            <header class="wall-topbar dashboard-header">
                <div class="wall-title-block">
                    <h1><i data-lucide="monitor"></i> จอแสดงผลนับสด</h1>
                    <p>ซ้าย = SKU ที่ยังไม่นับ · ขวา = รายการส่งแล้ว · แจ้งเตือนมุมขวาเมื่อมี เพิ่ม / แก้ไข / ลบ</p>
                </div>
                <div class="connection-badge badge-disconnected" id="connectionBadge" title="สถานะการเชื่อมต่อ">
                    <i data-lucide="wifi-off" id="badgeIcon"></i>
                    <span id="badgeText">ไม่ได้เชื่อมต่อ</span>
                </div>
            </header>

            <div class="wall-toolbar">
                <div class="wall-field">
                    <label for="wallFilterWarehouse">คลัง</label>
                    <select id="wallFilterWarehouse">
                        <option value="">ทุกคลัง</option>
                    </select>
                </div>
                <div class="wall-field">
                    <label for="wallFilterCycle">รอบนับ</label>
                    <select id="wallFilterCycle">
                        <option value="">— เดือนนี้ (ไม่กรองรอบ) —</option>
                    </select>
                </div>
                <span class="wall-live-badge" id="wallLiveBadge">Offline</span>
                <button type="button" class="wall-btn wall-btn-primary" id="wallBtnRefresh">
                    <i data-lucide="refresh-cw"></i> รีเฟรช
                </button>
                <button type="button" class="wall-btn" id="wallBtnFullscreen" aria-pressed="false" title="ซ่อนเมนูเต็มจอ">
                    <i data-lucide="maximize-2"></i> โหมดจอเต็ม
                </button>
            </div>
            <p class="wall-status" id="wallStatusText">กำลังเตรียม...</p>

            <div class="wall-split">
                <section class="wall-panel wall-panel-pending" aria-label="รายการที่รอนับ">
                    <div class="wall-panel-head">
                        <div>
                            <h2><i data-lucide="clock"></i> รายการที่รอนับ</h2>
                            <div class="wall-panel-sub">จาก SKU Master ที่ยังไม่มีใน inventory_counts</div>
                        </div>
                        <div class="wall-count" id="wallPendingCount">0</div>
                    </div>
                    <div class="wall-list" id="wallPendingList"></div>
                </section>

                <section class="wall-panel wall-panel-done" aria-label="รายการส่งเข้ามาแล้ว">
                    <div class="wall-panel-head">
                        <div>
                            <h2><i data-lucide="package-check"></i> รายการส่งเข้ามาแล้ว</h2>
                            <div class="wall-panel-sub">วันนี้ในขอบเขต: <span id="wallTodayCount">0</span> รายการ · แสดงสูงสุด 300 แถว</div>
                        </div>
                        <div class="wall-count" id="wallSubmittedCount">0</div>
                    </div>
                    <div class="wall-list" id="wallSubmittedList"></div>
                </section>
            </div>
        </div>
    </main>
</div>

    <div class="wall-toast-stack" id="wallToastStack" aria-live="polite" aria-label="การแจ้งเตือน เพิ่ม แก้ไข ลบ"></div>

    <script src="../Js/api.js"></script>
    <script src="../Js/settings-shared.js"></script>
    <script src="../Js/reconcile-shared.js"></script>
    <script src="../Js/sidebar-shared.js"></script>
    <script src="../Js/live-count-wall.js"></script>
    <script>
        if (typeof lucide !== 'undefined') lucide.createIcons();
    </script>
</body>
</html>
